<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal de Encuestas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-left">
            <button class="btn-flecha" id="btn-cerrar" title="Cerrar">&#8592;</button>
        </div>
        <h2 class="nav-center">Portal de Encuestas</h2>
        <div class="nav-right"></div>
    </nav>

    <div class="container">
        <h3>Iniciar Sesión</h3>
        <form id="form-login">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" placeholder="ejemplo@email.com" required>
            
            <label for="password">Contraseña:</label>
            <input type="password" id="password" placeholder="********" required>
            
            <button type="submit" class="btn-primary">Entrar al Sistema</button>
        </form>
        <p id="error-login" style="color: red; text-align: center;"></p>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const respuesta = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const datos = await respuesta.json();
                if (!respuesta.ok) throw new Error(datos.error || 'Credenciales incorrectas');

                // Guardamos los datos del usuario en sessionStorage para usarlos en las siguientes páginas
                sessionStorage.setItem('usuario', JSON.stringify(datos.usuario));

                // Redirección basada en el rol
                if (datos.usuario.rol === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'encuesta.html';
                }
            } catch (error) {
                document.getElementById('error-login').textContent = error.message;
            }
        });

        document.getElementById('btn-cerrar').addEventListener('click', () => {
            if (confirm('¿Deseas salir de la aplicación?')) {
                window.location.href = 'about:blank';
            }
        });
    </script>
</body>
</html>
